<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>123-HDS Parser</title>

<style>

body{
  background:#111;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:20px;
}

.container{
  max-width:1200px;
  margin:auto;
}

input{
  width:100%;
  padding:14px;
  background:#1f1f1f;
  border:1px solid #333;
  color:#fff;
  border-radius:10px;
  margin-bottom:15px;
  font-size:16px;
}

button{
  padding:14px 24px;
  border:none;
  border-radius:10px;
  background:#63ff00;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  opacity:.9;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

pre{
  background:#000;
  color:#63ff00;
  padding:15px;
  border-radius:10px;
  overflow:auto;
  margin-top:20px;
  max-height:700px;
  white-space:pre-wrap;
}

.loading{
  color:#63ff00;
  margin-top:20px;
  font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>123-HDS Parser</h1>

<input
id="url"
placeholder="https://www.123-hds.com/zhan-zhao-adventures/"
>

<button onclick="startFetch()">
ดึงข้อมูล
</button>

<div class="loading" id="loading"></div>

<div class="card">

<h2>JSON</h2>

<pre id="json"></pre>

</div>

<div class="card">

<h2>M3U</h2>

<pre id="m3u"></pre>

</div>

</div>

<script>

// ========================================
// PROXY
// ========================================

const PROXY =
"/api/proxy?url=";



// ========================================
// FETCH HTML
// ========================================

async function fetchHtml(url){

  try{

    const res =
    await fetch(
      PROXY +
      encodeURIComponent(url)
    );

    return await res.text();

  }catch(err){

    console.log(err);

    return "";

  }

}



// ========================================
// FIND M3U8
// ========================================

function findM3U8(html){

  // ====================================
  // DIRECT
  // ====================================

  let match =
  html.match(
/https?:\/\/main\.24playerhd\.com\/newplaylist\/[^"' ]+\.m3u8/gi
  );

  if(match && match.length){

    return match[0];

  }



  // ====================================
  // INDEX_TH
  // ====================================

  match =
  html.match(
/https?:\/\/main\.24playerhd\.com\/index_th\.php\?id=[^"' ]+/gi
  );

  if(match && match.length){

    return match[0];

  }



  // ====================================
  // ESCAPED
  // ====================================

  match =
  html.match(
/https?:\\\/\\\/main\.24playerhd\.com\\\/newplaylist\\\/[^"]+\.m3u8/gi
  );

  if(match && match.length){

    return match[0]
    .replaceAll("\\/","/");

  }

  return "";

}



// ========================================
// PARSE SERIES
// ========================================

async function parseSeries(url){

  // ====================================
  // SERIES PAGE
  // ====================================

  const html =
  await fetchHtml(url);

  const parser =
  new DOMParser();

  const doc =
  parser.parseFromString(
    html,
    "text/html"
  );



  // ====================================
  // TITLE
  // ====================================

  let title =
  doc.querySelector(".entry-title")?.innerText
  ||
  doc.querySelector("h1")?.innerText
  ||
  document.title
  ||
  "Unknown";



  title =
  title
  .replace("ดูซีรี่ย์ออนไลน์","")
  .replace("- 123-HD.COM","")
  .trim();




  // ====================================
  // IMAGE
  // ====================================

  let image = "";

  const poster =
  doc.querySelector(
    'meta[property="og:image"]'
  );

  if(poster){

    image =
    poster.content;

  }



  // ====================================
  // LINKS
  // ====================================

  const links =
  [...doc.querySelectorAll("a")];



  const episodes = [];



  // ====================================
  // LOOP
  // ====================================

  for(const a of links){

    const href =
    a.href;

    const text =
    a.innerText.trim();



    // =================================
    // FILTER
    // =================================

    if(!href) continue;

    if(
      !text.includes("EP")
      &&
      !text.includes("ตอน")
    ){
      continue;
    }



    try{

      document
      .getElementById("loading")
      .innerText =
      "กำลังดึง " + text;



      // ================================
      // EPISODE PAGE
      // ================================

      const epHtml =
      await fetchHtml(href);

      const epDoc =
      parser.parseFromString(
        epHtml,
        "text/html"
      );



      // ================================
      // FIND IFRAME
      // ================================

      const iframe =
      epDoc.querySelector("iframe")
      ||
      epDoc.querySelector(
        ".embed-responsive iframe"
      );



      if(!iframe){

        console.log(
          "ไม่เจอ iframe",
          href
        );

        continue;

      }



      // ================================
      // IFRAME URL
      // ================================

      const iframeUrl =
      iframe.src;



      console.log(
        "iframe:",
        iframeUrl
      );



      // ================================
      // FETCH PLAYER
      // ================================

      const playerHtml =
      await fetchHtml(
        iframeUrl
      );

      console.log(playerHtml);


      console.log(
        playerHtml
      );



      // ================================
      // FIND M3U8
      // ================================

      const m3u8 =
      findM3U8(
        playerHtml
      );



      console.log(
        "m3u8:",
        m3u8
      );



      // ================================
      // PUSH
      // ================================

      episodes.push({

        name:text,

        image:image,

        url:m3u8,

        referer:
        "https://www.123-hds.com/",

        info:
        "HD | พากย์ไทย",

        playInNatPlayer:
        "true"

      });



    }catch(err){

      console.log(err);

    }

  }



  // ====================================
  // RETURN
  // ====================================

  return {

    name:title,

    image:image,

    stations:episodes

  };

}



// ========================================
// BUILD M3U
// ========================================

function buildM3U(data){

  let m3u =
  "#EXTM3U\n\n";



  data.stations.forEach(st=>{

    m3u +=

`#EXTINF:-1 tvg-logo="${st.image}" group-title="${data.name}",${st.name}
#EXTVLCOPT:http-referrer=https://www.123-hds.com/
${st.url}

`;

  });



  return m3u;

}



// ========================================
// START
// ========================================

async function startFetch(){

  const url =
  document
  .getElementById("url")
  .value
  .trim();



  if(!url){

    alert("ใส่ URL");

    return;

  }



  document
  .getElementById("loading")
  .innerText =
  "กำลังโหลด...";



  document
  .getElementById("json")
  .textContent =
  "";



  document
  .getElementById("m3u")
  .textContent =
  "";



  try{

    const data =
    await parseSeries(url);



    document
    .getElementById("json")
    .textContent =
    JSON.stringify(
      data,
      null,
      2
    );



    document
    .getElementById("m3u")
    .textContent =
    buildM3U(data);



    document
    .getElementById("loading")
    .innerText =
    "โหลดเสร็จ";



  }catch(err){

    console.log(err);

    alert(err.message);

  }

}

</script>

</body>
</html>
