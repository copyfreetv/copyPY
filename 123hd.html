<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>123-HDS Parser</title>

<style>

body{
    background:#111;
    color:#fff;
    font-family:Arial;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

input{
    width:100%;
    padding:14px;
    background:#1a1a1a;
    border:1px solid #333;
    color:#fff;
    border-radius:12px;
    margin-bottom:15px;
    box-sizing:border-box;
}

button{
    background:#63ff00;
    color:#000;
    border:none;
    padding:14px 25px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.card{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

pre{
    background:#000;
    color:#63ff00;
    padding:15px;
    border-radius:10px;
    overflow:auto;
    max-height:600px;
}

.poster{
    width:220px;
    border-radius:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>123-HDS Parser</h1>

<input
id="url"
placeholder="https://www.123-hds.com/zhan-zhao-adventures/"
>

<button onclick="startFetch()">
ดึงข้อมูล
</button>

<div id="status"></div>

<div class="card">

<img
id="poster"
class="poster"
src=""
>

</div>

<div class="card">

<h2>JSON</h2>

<pre id="json"></pre>

</div>

<div class="card">

<h2>M3U</h2>

<pre id="m3u"></pre>

</div>

</div>

<script>

// ========================================
// FETCH HTML
// ========================================

async function fetchHtml(url){

    const proxy =
    "/api/proxy?url=" +
    encodeURIComponent(url);

    const res =
    await fetch(proxy);

    return await res.text();

}



// ========================================
// หา m3u8
// ========================================

function findM3U8(html){

    const regex =
/https?:\/\/main\.24playerhd\.com\/newplaylist\/[^"' ]+\.m3u8[^"' ]*/gi;

    const match =
    html.match(regex);

    if(match){

        return match[0];

    }

    return "";

}



// ========================================
// PARSE
// ========================================

async function parseSeries(url){

    const parser =
    new DOMParser();



    // ====================================
    // โหลดหน้าแรก
    // ====================================

    const html =
    await fetchHtml(url);

    console.log(html);



    const doc =
    parser.parseFromString(
        html,
        "text/html"
    );



    // ====================================
    // TITLE
    // ====================================

    const title =
    doc.querySelector("h1")
    ?.innerText
    ||
    "Unknown";



    // ====================================
    // POSTER
    // ====================================

    let image = "";



    const og =
    doc.querySelector(
        'meta[property="og:image"]'
    );



    if(og){

        image =
        og.content;

    }



    // ====================================
    // EPISODE LINKS
    // ====================================

    const episodeLinks =
    [];



    doc.querySelectorAll("a").forEach(a=>{

        const href =
        a.href || "";



        const text =
        a.innerText.trim();



        if(
            href.includes("-ep-")
        ){

            episodeLinks.push({

                name:text || href,

                url:href

            });

        }

    });



    // ====================================
    // ลบซ้ำ
    // ====================================

    const unique =
    [];

    const used =
    new Set();



    episodeLinks.forEach(ep=>{

        if(
            !used.has(ep.url)
        ){

            used.add(ep.url);

            unique.push(ep);

        }

    });



    console.log(unique);



    // ====================================
    // STATIONS
    // ====================================

    const stations =
    [];



    for(const ep of unique){

        console.log(
            "OPEN:",
            ep.url
        );



        // ================================
        // โหลดหน้า EP
        // ================================

        const epHtml =
        await fetchHtml(
            ep.url
        );



        console.log(epHtml);



        // ================================
        // หา m3u8
        // ================================

        let m3u8 =
        findM3U8(epHtml);



        // ================================
        // หา iframe
        // ================================

        if(!m3u8){

            const epDoc =
            parser.parseFromString(
                epHtml,
                "text/html"
            );



            const iframe =
            epDoc.querySelector(
                "iframe"
            );



            if(iframe){

                console.log(
                    "IFRAME:",
                    iframe.src
                );



                const iframeHtml =
                await fetchHtml(
                    iframe.src
                );



                console.log(
                    iframeHtml
                );



                m3u8 =
                findM3U8(
                    iframeHtml
                );

            }

        }



        console.log(
            "FOUND:",
            m3u8
        );



        stations.push({

            name:
            ep.name,

            image:
            image,

            url:
            m3u8,

            referer:
            "https://www.123-hds.com/",

            info:
            "HD | พากย์ไทย",

            playInNatPlayer:
            "true"

        });

    }



    return {

        name:title,

        image:image,

        stations:stations

    };

}



// ========================================
// BUILD M3U
// ========================================

function buildM3U(data){

    let m3u =
    "#EXTM3U\n\n";



    data.stations.forEach(st=>{

        m3u +=

`#EXTINF:-1 tvg-logo="${st.image}" group-title="${data.name}",${st.name}
#EXTVLCOPT:http-referrer=https://www.123-hds.com/
#EXTVLCOPT:http-user-agent=Mozilla/5.0
${st.url}

`;

    });



    return m3u;

}



// ========================================
// START
// ========================================

async function startFetch(){

    const url =
    document
    .getElementById("url")
    .value
    .trim();



    if(!url){

        alert("ใส่ URL");

        return;

    }



    document
    .getElementById("status")
    .innerText =
    "กำลังโหลด...";



    const data =
    await parseSeries(url);



    document
    .getElementById("poster")
    .src =
    data.image;



    document
    .getElementById("json")
    .textContent =
    JSON.stringify(
        data,
        null,
        2
    );



    document
    .getElementById("m3u")
    .textContent =
    buildM3U(data);



    document
    .getElementById("status")
    .innerText =
    "โหลดเสร็จ";

}

</script>

</body>
</html>
