<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>123HDTV Playlist Parser</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
    pre { background: #222; color: #0f0; padding: 10px; overflow-x: auto; }
    .series { margin-bottom: 30px; }
    .poster { max-width: 200px; }
  </style>
</head>
<body>
  <h1>123HDTV Playlist Parser</h1>
  <div id="output">Loading...</div>

<script>
async function fetchViaProxy(url) {
  const proxyUrl = `/api/123hd?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxyUrl);
  if (!res.ok) return null;
  return await res.text();
}

// ดึง m3u8 จริงจาก API halim_ajax_player
async function getM3U8FromAPI(postId, episode, nonce) {
  const apiUrl = `https://www.123hdtv.com/wp-content/themes/halimmovies_54/halim-ajax.php?action=halim_ajax_player&nonce=${nonce}&episode=${episode}&server=1&postid=${postId}`;
  const html = await fetchViaProxy(apiUrl);
  if (!html) return null;
  const doc = new DOMParser().parseFromString(html, "text/html");
  const iframe = doc.querySelector("iframe");
  if (!iframe) return null;
  const embedUrl = iframe.src;
  try {
    const url = new URL(embedUrl);
    const id = url.searchParams.get("id");
    if (!id) return null;
    return `https://main.24playerhd.com/newplaylist/${id}/${id}.m3u8`;
  } catch {
    return null;
  }
}

// สร้าง playlist .m3u
function generateM3U(seriesData) {
  let m3u = "#EXTM3U\n";
  const logo = seriesData.poster || "";
  const title = seriesData.title || "ซีรีส์";
  for (const ep of seriesData.episodes) {
    if (ep.video) {
      m3u += `#EXTINF:-1 tvg-logo="${logo}" tvg-season="1" tvg-episode="${ep.episode}", ${title} S01 EP${String(ep.episode).padStart(2,"0")}\n`;
      m3u += ep.video + "\n";
    }
  }
  return m3u;
}

// สร้าง JSON Output
function generateJSON(seriesData) {
  return [{
    id: seriesData.id || "",
    name: seriesData.title || "",
    category: "ซีรีส์",
    info: {
      poster: seriesData.poster || "",
      description: seriesData.synopsis || "",
      year: new Date().getFullYear()
    },
    seasons: [
      {
        season: 1,
        name: "Season 1",
        info: {
          poster: seriesData.poster || "",
          description: seriesData.synopsis || "",
          year: new Date().getFullYear()
        },
        episodes: seriesData.episodes.map(ep => ({
          episode: ep.episode,
          name: ep.name,
          video: ep.video || "",
          subtitle: "",
          referrer: "https://www.123hdtv.com"
        }))
      }
    ]
  }];
}

async function main() {
  const output = document.getElementById("output");
  output.innerHTML = "Loading...";

  // ค่า config จาก halim_cfg
  const postId = 181920;
  const nonce = "f597124a37";
  const totalEpisodes = 6;

  // ดึงทุกตอนพร้อมกัน
  const episodes = await Promise.all([...Array(totalEpisodes).keys()].map(async ep => {
    const m3u8 = await getM3U8FromAPI(postId, ep, nonce);
    return {
      episode: ep + 1,
      name: `A Knight of the Seven Kingdoms EP ${ep + 1}`,
      video: m3u8 || ""
    };
  }));

  const seriesData = {
    id: "a-lover-in-the-mortal-world",
    poster: "https://parser-xi.vercel.app/wp-content/uploads/2026/01/A-Knight-of-the-Seven-Kingdoms-2026-300x450.jpg",
    title: "a-lover-in-the-mortal-world",
    synopsis: "Genres: ซีรี่ย์ซับไทย, ซีรี่ย์ใหม่ 2026, ซีรี่ย์พากย์ไทย, ซีรี่ย์ฝรั่ง, Action บู๊, Adventure ผจญภัย, Drama ชีวิต, Fantasy แฟนตาซี, ดูซีรี่ย์ออนไลน์, ตอนแรก, พากย์ไทย, ซับไทย",
    episodes
  };

  const m3u = generateM3U(seriesData);
  const jsonData = generateJSON(seriesData);

  output.innerHTML = `
    <div class="series">
      <h2>${seriesData.title}</h2>
      <img class="poster" src="${seriesData.poster}" alt="${seriesData.title}">
      <p>${seriesData.synopsis}</p>
      <h3>Playlist (.m3u)</h3>
      <pre>${m3u}</pre>
      <h3>JSON Data</h3>
      <pre>${JSON.stringify(jsonData, null, 2)}</pre>
    </div>
  `;
}
main();
</script>
</body>
</html>
