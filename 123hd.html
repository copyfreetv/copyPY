<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>123-HDS Parser</title>

<style>

body{
    background:#0f0f0f;
    color:#fff;
    font-family:Arial;
    margin:0;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    color:#63ff00;
}

input{
    width:100%;
    padding:14px;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:12px;
    color:#fff;
    font-size:16px;
    margin-bottom:15px;
    box-sizing:border-box;
}

button{
    background:#63ff00;
    color:#000;
    border:none;
    padding:14px 25px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

.card{
    background:#181818;
    border-radius:18px;
    padding:20px;
    margin-top:20px;
}

pre{
    background:#000;
    color:#63ff00;
    padding:15px;
    border-radius:12px;
    overflow:auto;
    max-height:600px;
    white-space:pre-wrap;
    word-break:break-word;
}

.poster{
    width:220px;
    border-radius:15px;
    margin-top:15px;
}

.status{
    margin-top:15px;
    color:#63ff00;
}

</style>
</head>

<body>

<div class="container">

<h1>123-HDS Parser</h1>

<input
id="url"
placeholder="วางลิงค์ เช่น https://www.123-hds.com/zhan-zhao-adventures/"
>

<button onclick="startFetch()">
ดึงข้อมูล
</button>

<div class="status" id="status"></div>

<div class="card">

<h2>Poster</h2>

<img
id="poster"
class="poster"
src=""
>

</div>

<div class="card">

<h2>JSON</h2>

<pre id="json"></pre>

</div>

<div class="card">

<h2>M3U</h2>

<pre id="m3u"></pre>

</div>

</div>

<script>

// =========================================
// FETCH HTML ผ่าน proxy
// =========================================

async function fetchHtml(url){

    const proxy =
    "/api/proxy?url=" +
    encodeURIComponent(url);

    const res =
    await fetch(proxy);

    return await res.text();

}



// =========================================
// หา m3u8
// =========================================

function findM3U8(html){

    const patterns = [

        /https?:\/\/main\.24playerhd\.com\/newplaylist\/[^"' ]+\.m3u8[^"' ]*/gi,

        /https?:\/\/[^"' ]+\.m3u8[^"' ]*/gi

    ];

    for(const reg of patterns){

        const match =
        html.match(reg);

        if(match && match.length){

            return match[0];

        }

    }

    return "";

}



// =========================================
// PARSE SERIES
// =========================================

async function parseSeries(url){

    document.getElementById(
        "status"
    ).innerText =
    "กำลังโหลด...";



    // =====================================
    // โหลดหน้า series
    // =====================================

    const html =
    await fetchHtml(url);

    console.log(html);

    const parser =
    new DOMParser();

    const doc =
    parser.parseFromString(
        html,
        "text/html"
    );



    // =====================================
    // TITLE
    // =====================================

    const title =
    doc.querySelector("h1")?.innerText
    ||
    document.title
    ||
    "Unknown";



    // =====================================
    // POSTER
    // =====================================

    let image = "";

    const poster =
    doc.querySelector(
        'meta[property="og:image"]'
    );

    if(poster){

        image =
        poster.content;

    }



    // =====================================
    // หา episode links
    // =====================================

    const episodesLinks = [];

    doc.querySelectorAll("a").forEach(a=>{

        const href =
        a.href || "";

        const text =
        a.innerText.trim();

        if(
            href.includes("-ep-")
            ||
            text.includes("EP")
            ||
            text.includes("ตอน")
        ){

            episodesLinks.push({

                href,
                text

            });

        }

    });



    // =====================================
    // ลบซ้ำ
    // =====================================

    const uniqueEpisodes =
    [];

    const used =
    new Set();

    episodesLinks.forEach(ep=>{

        if(!used.has(ep.href)){

            used.add(ep.href);

            uniqueEpisodes.push(ep);

        }

    });



    console.log(uniqueEpisodes);



    // =====================================
    // stations
    // =====================================

    const stations = [];



    for(const ep of uniqueEpisodes){

        try{

            console.log(
                "OPEN EP:",
                ep.href
            );



            // ==============================
            // โหลดหน้า EP
            // ==============================

            const epHtml =
            await fetchHtml(
                ep.href
            );



            console.log(epHtml);



            // ==============================
            // หา m3u8
            // ==============================

            let m3u8 =
            findM3U8(epHtml);



            // ==============================
            // ถ้าไม่เจอ
            // หา iframe
            // ==============================

            if(!m3u8){

                const epDoc =
                parser.parseFromString(
                    epHtml,
                    "text/html"
                );

                const iframe =
                epDoc.querySelector(
                    "iframe"
                );



                if(iframe){

                    console.log(
                        "IFRAME:",
                        iframe.src
                    );



                    const iframeHtml =
                    await fetchHtml(
                        iframe.src
                    );



                    console.log(
                        iframeHtml
                    );



                    m3u8 =
                    findM3U8(
                        iframeHtml
                    );

                }

            }



            console.log(
                "FOUND:",
                m3u8
            );



            stations.push({

                name:
                ep.text,

                image:
                image,

                url:
                m3u8,

                referer:
                "https://www.123-hds.com/",

                info:
                "HD | พากย์ไทย",

                playInNatPlayer:
                "true"

            });



        }catch(err){

            console.log(err);

        }

    }



    return {

        name:title,

        image:image,

        stations:stations

    };

}



// =========================================
// BUILD M3U
// =========================================

function buildM3U(data){

    let m3u =
    "#EXTM3U\n\n";



    data.stations.forEach(st=>{

        m3u +=

`#EXTINF:-1 tvg-logo="${st.image}" group-title="${data.name}",${st.name}
#EXTVLCOPT:http-referrer=https://www.123-hds.com/
#EXTVLCOPT:http-user-agent=Mozilla/5.0
${st.url}

`;

    });



    return m3u;

}



// =========================================
// START
// =========================================

async function startFetch(){

    const url =
    document
    .getElementById("url")
    .value
    .trim();



    if(!url){

        alert("ใส่ URL");

        return;

    }



    try{

        const data =
        await parseSeries(url);



        document
        .getElementById("poster")
        .src =
        data.image;



        document
        .getElementById("json")
        .textContent =
        JSON.stringify(
            data,
            null,
            2
        );



        document
        .getElementById("m3u")
        .textContent =
        buildM3U(data);



        document
        .getElementById("status")
        .innerText =
        "โหลดเสร็จ";



    }catch(err){

        console.log(err);

        alert(err.message);

    }

}

</script>

</body>
</html>
