<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>123-HDS Parser</title>

<style>

body{
  background:#111;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:20px;
}

.container{
  max-width:1200px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  background:#1f1f1f;
  border:1px solid #333;
  color:#fff;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#63ff00;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

pre{
  background:#000;
  color:#63ff00;
  padding:15px;
  border-radius:10px;
  overflow:auto;
  margin-top:20px;
  max-height:600px;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>123-HDS Parser</h1>

<input
id="url"
placeholder="วางลิงค์ซีรีย์ เช่น https://www.123-hds.com/series/xxxxx/"
>

<button onclick="startFetch()">
ดึงข้อมูล
</button>

<div class="card">

<h2>JSON</h2>

<pre id="json"></pre>

</div>

<div class="card">

<h2>M3U</h2>

<pre id="m3u"></pre>

</div>

</div>

<script>

// =====================================
// FETCH HTML
// =====================================

async function fetchHtml(url){

  const res =
  await fetch(url);

  return await res.text();

}



// =====================================
// FIND M3U8
// =====================================

function findM3U8(html){

  const regex =
  /https?:\/\/[^"' ]+\.m3u8[^"' ]*/g;

  const match =
  html.match(regex);

  if(match){

    return match[0];

  }

  return "";

}



// =====================================
// PARSE EPISODES
// =====================================

async function parseSeries(url){

  const html =
  await fetchHtml(url);

  const parser =
  new DOMParser();

  const doc =
  parser.parseFromString(
    html,
    "text/html"
  );



  // title

  const title =
  doc.querySelector("h1")?.innerText ||
  "Unknown";



  // poster

  const image =
  doc.querySelector("img")?.src ||
  "";



  // episode links

  const links =
  [...doc.querySelectorAll("a")];



  const episodes = [];



  for(const a of links){

    const href =
    a.href;

    const text =
    a.innerText.trim();



    if(
      !text.includes("EP")
      &&
      !text.includes("ตอน")
    ){
      continue;
    }



    try{

      const epHtml =
      await fetchHtml(href);

      const m3u8 =
      findM3U8(epHtml);



      episodes.push({

        name:text,

        image:image,

        url:m3u8,

        referer:
        "https://www.123-hds.com/",

        info:
        "HD | พากย์ไทย",

        playInNatPlayer:
        "true"

      });

    }catch(e){

      console.log(e);

    }

  }



  return {

    name:title,

    image:image,

    stations:episodes

  };

}



// =====================================
// BUILD M3U
// =====================================

function buildM3U(data){

  let m3u =
  "#EXTM3U\n\n";



  data.stations.forEach(st=>{

    m3u +=
`#EXTINF:-1 tvg-logo="${st.image}" group-title="${data.name}",${st.name}
#EXTVLCOPT:http-referrer=https://www.123-hds.com/
${st.url}

`;

  });

  return m3u;

}



// =====================================
// START
// =====================================

async function startFetch(){

  const url =
  document
  .getElementById("url")
  .value;



  if(!url){

    alert("ใส่ URL");

    return;

  }



  const data =
  await parseSeries(url);



  document
  .getElementById("json")
  .textContent =
  JSON.stringify(
    data,
    null,
    2
  );



  document
  .getElementById("m3u")
  .textContent =
  buildM3U(data);

}

</script>

</body>
</html>
