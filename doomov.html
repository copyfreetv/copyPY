<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบดึงข้อมูลภาพยนตร์เดี่ยว + JSON Export (Fix Playlist.m3u8)</title>
    <style>
        :root { --gold: #ffeb3b; --bg: #0f0f0f; --card: #1e1e1e; --blue: #2196F3; --green: #4CAF50; --purple: #9C27B0; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .control-panel { background: #222; padding: 20px; border-radius: 12px; margin-bottom: 25px; border-top: 4px solid var(--blue); }
        .input-group { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; justify-content: center; }
        input { background: #333; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; width: 80px; text-align: center; }
        
        .status-box { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 5px solid var(--gold); text-align: center; }
        .action-group { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; transition: 0.3s; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 240px; object-fit: cover; background: #2a2a2a; }
        .card-body { padding: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 15px; font-weight: bold; color: var(--gold); margin-bottom: 8px; min-height: 44px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        button.start-btn { background: var(--blue); color: white; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button.download-btn { background: var(--purple); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: none; }
        button.view-btn { background: #333; color: white; border: 1px solid #555; padding: 6px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 8px; font-size: 12px; }
        button.json-btn { background: #444; color: #ffeb3b; border: 1px solid #666; padding: 6px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 5px; font-size: 12px; }
        button.copy-btn { background: var(--green); color: white; border: none; padding: 6px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 5px; font-size: 11px; font-weight: bold; display: none; }
        
        pre { background: #000; color: #00ff41; padding: 10px; font-size: 11px; overflow-x: auto; max-height: 150px; display: none; border-radius: 5px; text-align: left; white-space: pre-wrap; word-break: break-all; margin-top: 8px; }
        .badge { background: var(--blue); padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-bottom: 8px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--gold);">สคริปต์ ดึงข้อมูลหนังออนไลน์เดี่ยว + ระบบออก JSON (Auto Double-Check)</h1>
    
    <div class="control-panel">
        <div class="input-group">
            <label>เริ่มจากหน้า:</label>
            <input type="number" id="startPage" value="1" min="1">
            <label>ถึงหน้า:</label>
            <input type="number" id="endPage" value="1" min="1">
            <button class="start-btn" onclick="startHarvesting()">🚀 เริ่มดึงข้อมูลหนัง</button>
        </div>
        
        <div class="status-box">
            <div id="loader">📍 พร้อมสำหรับการดึงข้อมูลภาพยนตร์</div>
            <div id="stats" style="color: #888; font-size: 13px; margin-top: 5px;"></div>
            <div class="action-group">
                <button id="downloadJsonBtn" class="download-btn" onclick="downloadAllJson()">📥 ดาวน์โหลดไฟล์ JSON ทั้งหมด</button>
            </div>
        </div>
    </div>

    <div id="output" class="grid"></div>
</div>

<script>
const PROXY = '/api/proxy-k24hd?url=';
const BASE_CAT = 'https://kubhd24.net/category/%e0%b8%94%e0%b8%b9%e0%b8%ab%e0%b8%99%e0%b8%b1%e0%b8%87%e0%b8%b1%e0%b8%ad%e0%b8%ad%e0%b8%99%e0%b9%84%e0%b8%a5%e0%b8%99%e0%b9%8c-2026/';

let allHarvestedData = [];

async function request(url, isJson = false) {
    try {
        const res = await fetch(PROXY + encodeURIComponent(url));
        if (!res.ok) return null;
        return isJson ? await res.json() : await res.text();
    } catch (e) { return null; }
}

// 🛠️ ปรับปรุงระบบเรียกตัวเล่นให้พยายาม "เบิ้ลสตรีมดึงซ้ำเพื่อบังคับให้แคชตื่นขึ้นมาทำงาน"
async function getStream(postId) {
    // ส่งรอบแรกเพื่อปลุกสตรีมเครื่องเล่นของเพจ
    await request(`https://kubhd24.net/wp-admin/admin-ajax.php?action=mix_get_player&post_id=${postId}`, true);
    
    // ดีเลย์นิดหน่อยก่อนดึงซ้ำรอบสอง (เสมือนการรีเฟรชรอบ 2 หลังบ้าน)
    await new Promise(resolve => setTimeout(resolve, 300));
    
    const json = await request(`https://kubhd24.net/wp-admin/admin-ajax.php?action=mix_get_player&post_id=${postId}`, true);
    if (!json?.success) return null;
    
    // ดักจับทั้งลิงก์เต็ม และลิงก์ย่อที่มีเฉพาะก้อนตัวแปรสตรีมมิ่ง
    const match = json.player.match(/data-src="([^"]+)"/) || json.player.match(/src="([^"]+)"/);
    if (!match) return null;
    
    const rawUrl = match[1];
    if (rawUrl.includes('playlist.m3u8')) {
        return rawUrl.startsWith('http') ? rawUrl : `https:${rawUrl}`;
    }
    
    return `https://media.vdohls.com/${rawUrl.split('/').pop()}/playlist.m3u8`;
}

async function parseMovie(id) {
    // 🛠️ สั่งดึงข้อมูลซอร์สโค้ดหน้าเว็บครั้งแรกเพื่อกระตุ้นระบบต้นทาง
    let html = await request(`https://kubhd24.net/movie/${id}/`);
    if (!html) return null;
    
    // ทำการรีเฟรชส่งคำขอรอบที่ 2 ทันทีอัตโนมัติ แก้ปัญหาดีเลย์ของบอทเครื่องเล่น
    await new Promise(resolve => setTimeout(resolve, 200));
    html = await request(`https://kubhd24.net/movie/${id}/`);
    
    const doc = new DOMParser().parseFromString(html, "text/html");
    const title = doc.querySelector("h1")?.textContent.trim() || id;
    
    const imgEl = doc.querySelector("img.wp-post-image") || doc.querySelector(".poster img");
    const poster = imgEl ? (imgEl.getAttribute("data-src") || imgEl.src) : '';
    
    let streamUrl = '';

    // วิธีที่ 1: ตรวจสอบ Regex หาแพทเทิร์นตรงของ vdohls/playlist.m3u8 ในสคริปต์หน้าเพจ
    const directVdoMatch = html.match(/media\.vdohls\.com\/([^\/"]+)\/playlist\.m3u8/) || html.match(/[\/"]([\w_\-]+)\/playlist\.m3u8/);
    if (directVdoMatch) {
        if (directVdoMatch[0].includes('media.vdohls.com')) {
            streamUrl = directVdoMatch[0].startsWith('http') ? directVdoMatch[0] : `https://${directVdoMatch[0]}`;
        } else {
            // กรณีเจอแค่ก้อนไอดีสตรีมมิ่ง คืนค่าจัดให้อยู่ในฟอร์แมต playlist.m3u8 ที่พี่แกะเจอใน DevTools 
            const cleanId = directVdoMatch[1];
            streamUrl = `https://media.vdohls.com/${cleanId}/playlist.m3u8`;
        }
    }

    // วิธีที่ 2: ดึงจากไอดีตัวเล่นระบบหลังบ้านหากวิธีแรกยังไม่ได้สตรีมตรงๆ
    if (!streamUrl) {
        let postId = null;
        
        const movieIframe = doc.querySelector(".movie-iframe");
        if (movieIframe) postId = movieIframe.getAttribute("data-id");

        if (!postId) {
            const favBtn = doc.querySelector("button.add-favorite") || doc.querySelector("[data-post-id]");
            if (favBtn) postId = favBtn.getAttribute("data-post-id");
        }

        if (!postId) {
            const playerWrapper = doc.querySelector("[id*='player']");
            if (playerWrapper) postId = playerWrapper.getAttribute("data-post-id") || playerWrapper.id.replace(/\D/g, "");
        }

        if (postId) {
            const url = await getStream(postId);
            if (url) streamUrl = url;
        }
    }

    if (!streamUrl) {
        streamUrl = 'ไม่พบลิงก์สตรีมหรือถูกบล็อก';
    }
    
    return { title, poster, streamUrl };
}

async function startHarvesting() {
    const startPage = parseInt(document.getElementById("startPage").value);
    const endPage = parseInt(document.getElementById("endPage").value);
    const loader = document.getElementById("loader");
    const output = document.getElementById("output");
    const stats = document.getElementById("stats");
    const downloadBtn = document.getElementById("downloadJsonBtn");

    output.innerHTML = ""; 
    allHarvestedData = [];
    downloadBtn.style.display = "none";
    let totalMoviesFound = 0;

    for (let p = startPage; p <= endPage; p++) {
        const pageUrl = p === 1 ? BASE_CAT : `${BASE_CAT}page/${p}/`;
        loader.textContent = `🔍 กำลังสแกนหน้าหมวดหมู่หนังที่ ${p}...`;
        
        const catHtml = await request(pageUrl);
        if (!catHtml) continue;

        const regex = /href="https:\/\/kubhd24\.net\/movie\/([^"\/]+)\//g;
        const ids = Array.from(new Set([...catHtml.matchAll(regex)].map(m => m[1]))).filter(i => i !== 'movie');
        
        totalMoviesFound += ids.length;
        stats.textContent = `กำลังจัดการหน้าที่ ${p} (พบหนังใหม่ ${ids.length} เรื่อง / รวมสะสม ${totalMoviesFound} เรื่อง)`;

        for (let i = 0; i < ids.length; i++) {
            loader.textContent = `⏳ หน้า ${p} | เรื่องที่ ${i+1}/${ids.length}: ${ids[i]}`;
            
            const data = await parseMovie(ids[i]);
            if (data) {
                const jsonStructure = {
                    "name": data.title,
                    "image": data.poster,
                    "url": data.streamUrl,
                    "referer": "",
                    "info": "HD | พากย์ไทย | Server StreamX ",
                    "playInNatPlayer": "true"
                };
                
                allHarvestedData.push(jsonStructure);
                renderCard(data, jsonStructure, p);
            }
        }
    }
    loader.textContent = `✅ ดึงข้อมูลหนังสำเร็จ! รวมทั้งหมด ${totalMoviesFound} เรื่อง จากหน้า ${startPage}-${endPage}`;
    if(allHarvestedData.length > 0) {
        downloadBtn.style.display = "inline-block";
    }
}

function renderCard(data, jsonStructure, pageNum) {
    let m3u = "#EXTM3U\n";
    m3u += `#EXTINF:-1 tvg-logo="${data.poster}" group-title="หนังภาพยนตร์เดี่ยว", ${data.title}\n${data.streamUrl}\n`;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <img src="${data.poster || 'https://via.placeholder.com/300x240?text=No+Poster'}" alt="Poster">
        <div class="card-body">
            <div>
                <span class="badge">หน้า ${pageNum}</span>
                <div class="card-title">${data.title}</div>
            </div>
            <div>
                <button class="view-btn" onclick="toggleBlock(this, '.m3u-box')">📂 แสดง M3U Playlist</button>
                <button class="json-btn" onclick="toggleBlock(this, '.json-box')">⚙️ แสดงโครงสร้าง JSON</button>
                <button class="copy-btn" onclick="copyText(this)">📋 คัดลอกข้อมูล</button>
                
                <pre class="m3u-box">${m3u}</pre>
                <pre class="json-box">${JSON.stringify(jsonStructure, null, 2)}</pre>
            </div>
        </div>
    `;
    document.getElementById("output").appendChild(card);
}

function toggleBlock(btn, targetClass) {
    const parent = btn.parentElement;
    const targetBlock = parent.querySelector(targetClass);
    const copyBtn = parent.querySelector(".copy-btn");
    const allPre = parent.querySelectorAll("pre");
    
    allPre.forEach(pre => {
        if(pre !== targetBlock) pre.style.display = 'none';
    });

    if (targetBlock.style.display === 'block') {
        targetBlock.style.display = 'none';
        copyBtn.style.display = 'none';
    } else {
        targetBlock.style.display = 'block';
        copyBtn.style.display = 'block';
    }
}

function copyText(btn) {
    const parent = btn.parentElement;
    let textToCopy = "";
    
    const m3uBox = parent.querySelector(".m3u-box");
    const jsonBox = parent.querySelector(".json-box");
    
    if (m3uBox.style.display === 'block') textToCopy = m3uBox.textContent;
    if (jsonBox.style.display === 'block') textToCopy = jsonBox.textContent;
    
    if(!textToCopy) return;

    navigator.clipboard.writeText(textToCopy.trim()).then(() => {
        const oldText = btn.textContent;
        btn.textContent = '✅ คัดลอกสำเร็จ!';
        btn.style.background = '#009688';
        setTimeout(() => {
            btn.textContent = oldText;
            btn.style.background = 'var(--green)';
        }, 1500);
    });
}

function downloadAllJson() {
    if(allHarvestedData.length === 0) return;
    const blob = new Blob([JSON.stringify(allHarvestedData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `movies_list_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>
</body>
</html>
