```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doo-Nang Movie Scraper</title>

<style>
body{
    background:#111;
    color:#fff;
    font-family:Arial;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

button{
    padding:12px 20px;
    border:none;
    background:#5FBE00;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
}

pre{
    background:#000;
    color:#5FBE00;
    padding:15px;
    overflow:auto;
    max-height:500px;
    border-radius:10px;
    margin-top:20px;
}

#status{
    margin-top:20px;
    color:#5FBE00;
}
</style>
</head>

<body>

<div class="container">

<h1>Doo-Nang Full Movie Scraper</h1>

<button id="startBtn">
เริ่มดึงหนังทั้งหมด
</button>

<div id="status"></div>

<pre id="output"></pre>

</div>

<script>

const GRAPHQL_URL = "https://api.doo-nang.com/graphql";

let allMovies = [];


// ===============================
// ตรวจสอบ subtitle
// ===============================

async function checkSubtitleExists(url) {
    try {
        const res = await fetch(url, {
            method: 'HEAD'
        });

        return res.ok;

    } catch {
        return false;
    }
}


// ===============================
// audio tracks
// ===============================

function extractAudioTracks(m3u8Text) {

    const audioTracks = [];

    const regex =
/#EXT-X-MEDIA:TYPE=AUDIO.*?LANGUAGE="([^"]+)".*?URI="([^"]+)"/g;

    let match;

    while ((match = regex.exec(m3u8Text)) !== null) {

        audioTracks.push({
            language: match[1],
            uri: match[2]
        });
    }

    return audioTracks;
}



// ===============================
// process movie video
// ===============================

async function processMovie(movie) {

    const transcodeUuid = movie.video?.transcodeUuid;
    const cdnHostname = movie.video?.cdnHostname;

    if (!transcodeUuid || !cdnHostname) {
        return null;
    }

    const base = `https://${cdnHostname}/${transcodeUuid}`;

    const videoUrl =
`https://api.doo-nang.com/video/${transcodeUuid}/playlist.m3u8`;

    let subtitles = [];

    let audioTracks = [];


    // subtitle

    if (movie.video?.subtitleMetadata) {

        for (const [lang, subs] of Object.entries(movie.video.subtitleMetadata)) {

            for (const sub of subs) {

                const src =
`${base}/${sub.pathName}.${sub.codec.toLowerCase()}`;

                if (await checkSubtitleExists(src)) {

                    subtitles.push({
                        lang,
                        codec: sub.codec,
                        src
                    });

                }
            }
        }
    }


    // audio tracks

    try {

        const res = await fetch(videoUrl);

        if (res.ok) {

            const text = await res.text();

            audioTracks = extractAudioTracks(text);
        }

    } catch {}


    return {
        id: movie.id,
        title: movie.titleTh || movie.titleEn,
        year: movie.releaseDate?.substring(0,4) || "0000",
        poster: movie.posterUrl,
        plot: movie.synopsisTh || "-",
        video: videoUrl,
        subtitles,
        audioTracks
    };
}



// ===============================
// fetch movie by id
// ===============================

async function fetchMovie(id) {

    const query = `

    query getMovie($id: Int!) {

        movie(id: $id) {

            id
            titleTh
            titleEn
            nation
            synopsisTh
            descriptionTh
            releaseDate
            posterUrl

            video {
                transcodeUuid
                cdnHostname
                subtitleMetadata
            }
        }
    }
    `;


    try {

        const response = await fetch(GRAPHQL_URL, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                query,
                variables: {
                    id
                }
            })
        });

        const result = await response.json();

        const movie = result?.data?.movie;

        if (!movie) {
            return null;
        }

        return await processMovie(movie);

    } catch (err) {

        console.log("ERROR ID:", id);

        return null;
    }
}



// ===============================
// generate m3u
// ===============================

function generateM3U(movies) {

    let m3u = "#EXTM3U\n";

    movies.forEach(movie => {

        if (!movie?.video) return;

        m3u +=
`#EXTINF:-1 group-title="Movies" tvg-logo="${movie.poster}", ${movie.title} (${movie.year})\n`;

        m3u += `${movie.video}\n`;

    });

    return m3u;
}



// ===============================
// start scraper
// ===============================

async function startScraping() {

    allMovies = [];

    const output = document.getElementById("output");

    const status = document.getElementById("status");


    output.textContent = "";

    status.innerHTML = "กำลังดึงข้อมูล...";


    // เปลี่ยน range ได้
    // ยิ่งเยอะยิ่งนาน

    const START_ID = 1;
    const END_ID = 15000;


    for (let id = START_ID; id <= END_ID; id++) {

        status.innerHTML =
`กำลังดึง Movie ID: ${id}`;

        const movie = await fetchMovie(id);

        if (movie) {

            allMovies.push(movie);

            output.textContent =
generateM3U(allMovies);

            console.log("FOUND:", movie.title);
        }


        // delay กันยิงหนักเกิน

        await new Promise(r => setTimeout(r, 150));
    }


    status.innerHTML =
`เสร็จสิ้น พบหนัง ${allMovies.length} เรื่อง`;


    downloadM3U();
}



// ===============================
// download
// ===============================

function downloadM3U() {

    const m3u = generateM3U(allMovies);

    const blob =
new Blob([m3u], {
    type:'text/plain'
});

    const url =
window.URL.createObjectURL(blob);

    const a =
document.createElement('a');

    a.href = url;

    a.download = "doo-nang-movies.m3u";

    a.click();
}



// ===============================

document
.getElementById("startBtn")
.addEventListener("click", startScraping);

</script>

</body>
</html>
```
