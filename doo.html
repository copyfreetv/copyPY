<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doo-Nang Movie Explorer</title>

<style>

:root{
    --bg:#0f0f0f;
    --card:#1d1d1d;
    --gold:#ffeb3b;
    --blue:#2196f3;
}

body{
    background:var(--bg);
    color:#fff;
    font-family:tahoma;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.control{
    background:#1b1b1b;
    padding:20px;
    border-radius:12px;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    border:1px solid #333;
}

.poster{
    width:100%;
    height:380px;
    object-fit:cover;
}

.card-body{
    padding:15px;
}

.title{
    color:var(--gold);
    font-size:16px;
    font-weight:bold;
    margin-bottom:8px;
}

.meta{
    color:#aaa;
    font-size:12px;
    margin-bottom:10px;
}

button{
    border:none;
    padding:10px;
    width:100%;
    margin-top:8px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.fetch-btn{
    background:var(--blue);
    color:#fff;
}

.view-btn{
    background:#444;
    color:#fff;
}

pre{
    display:none;
    background:#000;
    color:#00ff41;
    padding:10px;
    border-radius:6px;
    overflow:auto;
    max-height:250px;
    font-size:11px;
    margin-top:10px;
}

select,input{
    padding:10px;
    border-radius:6px;
    border:none;
    background:#333;
    color:#fff;
}

.status{
    margin-top:15px;
    color:#ffeb3b;
}

</style>
</head>

<body>

<div class="container">

<h1 style="text-align:center;color:var(--gold)">
🎬 Doo-Nang Movie Explorer
</h1>

<div class="control">

<select id="category">

<option value="movie">ภาพยนตร์</option>
<option value="thai-movie">ภาพยนตร์ ไทย</option>
<option value="korean-movie">ภาพยนตร์ เกาหลี</option>
<option value="japanese-movie">ภาพยนตร์ ญี่ปุ่น</option>
<option value="indian-movie">ภาพยนตร์ อินเดีย</option>
<option value="cartoon-movie">ภาพยนตร์ การ์ตูน</option>
<option value="historical-movie">หนังประวัติศาสตร์</option>

</select>

<input type="number" id="startPage" value="1" min="1">

<input type="number" id="endPage" value="1" min="1">

<button class="fetch-btn" onclick="startHarvest()">
🚀 เริ่มดึงข้อมูล
</button>

<div class="status" id="status">
พร้อมทำงาน
</div>

</div>

<div id="output" class="grid"></div>

</div>

<script>

const GRAPHQL =
"https://api.doo-nang.com/graphql";


// ==========================
// category map
// ==========================

const categoryMap = {

    movie:
    "https://www.doo-nang.com/%E0%B8%94%E0%B8%B9%E0%B8%AB%E0%B8%99%E0%B8%B1%E0%B8%87%E0%B8%AD%E0%B8%AD%E0%B8%99%E0%B9%84%E0%B8%A5%E0%B8%99%E0%B9%8C/list?type=content&value=movies&title=%E0%B8%A0%E0%B8%B2%E0%B8%9E%E0%B8%A2%E0%B8%99%E0%B8%95%E0%B8%A3%E0%B9%8C",

    "thai-movie":
    "https://www.doo-nang.com/ดูหนังออนไลน์/list?type=movie-tag&value=ไทย&title=ภาพยนตร์ ไทย",

    "korean-movie":
    "https://www.doo-nang.com/ดูหนังออนไลน์/list?type=movie-tag&value=เกาหลี",

    "japanese-movie":
    "https://www.doo-nang.com/ดูหนังออนไลน์/list?type=movie-tag&value=ญี่ปุ่น",

    "indian-movie":
    "https://www.doo-nang.com/ดูหนังออนไลน์/list?type=movie-tag&value=อินเดีย",

    "cartoon-movie":
    "https://www.doo-nang.com/ดูหนังออนไลน์/list?type=movie-tag&value=การ์ตูน",

    "historical-movie":
    "https://www.doo-nang.com/ดูหนังออนไลน์/list?type=movie-tag&value=ประวัติศาสตร์"
};



// ==========================
// request html
// ==========================

async function request(url){

    const res = await fetch(url);

    return await res.text();
}



// ==========================
// fetch movie
// ==========================

async function fetchMovie(id){

const query = `

query getMovie($id:Int!){

movie(id:$id){

id
titleTh
titleEn
synopsisTh
posterUrl
releaseDate

video{
transcodeUuid
cdnHostname
}

}
}
`;

try{

const res = await fetch(GRAPHQL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
query,
variables:{id}
})

});

const json = await res.json();

const movie = json?.data?.movie;

if(!movie) return null;

const uuid = movie.video?.transcodeUuid;
const host = movie.video?.cdnHostname;

if(!uuid || !host) return null;

return {

id:movie.id,

title:
movie.titleTh ||
movie.titleEn,

plot:
movie.synopsisTh || "-",

poster:
movie.posterUrl,

year:
movie.releaseDate?.substring(0,4),

video:
`https://api.doo-nang.com/video/${uuid}/playlist.m3u8`

};

}catch{

return null;

}

}



// ==========================
// parse page
// ==========================

async function parsePage(url){

const html = await request(url);

const ids =
[
...html.matchAll(/movie\/(\d+)/g)
]
.map(x=>x[1]);

return [...new Set(ids)];

}



// ==========================
// start
// ==========================

async function startHarvest(){

const category =
document.getElementById("category").value;

const startPage =
parseInt(
document.getElementById("startPage").value
);

const endPage =
parseInt(
document.getElementById("endPage").value
);

const output =
document.getElementById("output");

const status =
document.getElementById("status");

output.innerHTML = "";

let total = 0;

for(let p=startPage;p<=endPage;p++){

status.innerHTML =
`🔍 กำลังสแกนหน้า ${p}`;

let pageUrl =
categoryMap[category];

if(p > 1){
pageUrl += `page/${p}/`;
}

const ids =
await parsePage(pageUrl);

for(let i=0;i<ids.length;i++){

status.innerHTML =
`🎬 หน้า ${p} | เรื่อง ${i+1}/${ids.length}`;

const movie =
await fetchMovie(ids[i]);

if(movie){

renderMovie(movie,p);

total++;

}

await new Promise(r=>setTimeout(r,100));

}

}

status.innerHTML =
`✅ เสร็จสิ้น พบ ${total} เรื่อง`;

}



// ==========================
// render
// ==========================

function renderMovie(movie,page){

const m3u =

`#EXTM3U

#EXTINF:-1 tvg-logo="${movie.poster}" group-title="Movies", ${movie.title}
${movie.video}`;

const json =
JSON.stringify(movie,null,2);

const card =
document.createElement("div");

card.className = "card";

card.innerHTML = `

<img class="poster" src="${movie.poster}">

<div class="card-body">

<div class="meta">
หน้า ${page}
</div>

<div class="title">
${movie.title}
</div>

<div class="meta">
${movie.year}
</div>

<button class="view-btn"
onclick="toggleBox(this)">
📂 แสดง M3U Playlist
</button>

<pre>${m3u}</pre>

<button class="view-btn"
onclick="toggleBox(this)">
📦 แสดง JSON
</button>

<pre>${json}</pre>

</div>
`;

document
.getElementById("output")
.appendChild(card);

}



// ==========================
// toggle
// ==========================

function toggleBox(btn){

const pre =
btn.nextElementSibling;

const isOpen =
pre.style.display === "block";

pre.style.display =
isOpen ? "none" : "block";

btn.textContent =
isOpen
?
btn.textContent.includes("JSON")
? "📦 แสดง JSON"
: "📂 แสดง M3U Playlist"

:
btn.textContent.includes("JSON")
? "✖ ปิด JSON"
: "✖ ปิด Playlist";

}

</script>

</body>
</html>
