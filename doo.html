<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doo-Nang Series Parser & M3U Generator</title>
  <style>
    :root { --primary: #5FBE00; --dark: #1a1a1a; --gray: #333; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #eee; padding: 20px; line-height: 1.6; }
    .container { max-width: 900px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--gray); background: #222; color: #fff; font-size: 16px; }
    button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    #fetchBtn { background: var(--primary); color: #000; }
    #fetchBtn:hover { background: #4da300; transform: translateY(-2px); }
    .download-btn { background: #0078d7; color: #fff; margin-top: 10px; display: none; }
    pre { background: #000; color: #5FBE00; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 13px; max-height: 400px; border: 1px solid var(--gray); }
    .section-title { margin-top: 30px; border-left: 4px solid var(--primary); padding-left: 10px; color: var(--primary); }
    .loader { display: none; text-align: center; margin: 20px 0; color: var(--primary); font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h1>Doo-Nang Series Parser</h1>
  
  <div class="input-group">
    <input id="showId" type="number" placeholder="ใส่ Show ID (เช่น 1234)">
    <button id="fetchBtn">ดึงข้อมูลและสร้าง M3U</button>
  </div>

  <div id="loader" class="loader">⏳ กำลังประมวลผลข้อมูล...</div>

  <div id="resultArea" style="display: none;">
    <button id="downloadBtn" class="download-btn">📥 ดาวน์โหลดไฟล์ .m3u</button>
    
    <h3 class="section-title">M3U Playlist Content</h3>
    <pre id="m3uOutput"></pre>

    <h3 class="section-title">JSON Raw Data</h3>
    <pre id="jsonOutput"></pre>
  </div>
</div>

<script>
const nationMap = { TH: "ซีรีส์ ไทย", KR: "ซีรีส์ เกาหลี", JP: "ซีรีส์ ญี่ปุ่น", US: "ซีรีส์ สหรัฐอเมริกา" };

// --- 1. Functions สำหรับดึงข้อมูล ---

async function checkSubtitleExists(url) {
  try {
    const res = await fetch(url, { method: 'HEAD' });
    return res.ok;
  } catch { return false; }
}

function extractAudioTracks(m3u8Text) {
  const audioTracks = [];
  const regex = /#EXT-X-MEDIA:TYPE=AUDIO.*?LANGUAGE="([^"]+)".*?URI="([^"]+)"/g;
  let match;
  while ((match = regex.exec(m3u8Text)) !== null) {
    audioTracks.push({ language: match[1], uri: match[2] });
  }
  return audioTracks;
}

async function processEpisode(ep) {
  const transcodeUuid = ep.video?.transcodeUuid;
  const cdnHostname = ep.video?.cdnHostname;
  let videoUrl = "";
  let subtitle = [];
  let audioTracks = [];

  if (transcodeUuid && cdnHostname) {
    const base = `https://${cdnHostname}/${transcodeUuid}`;
    videoUrl = `https://api.doo-nang.com/video/${transcodeUuid}/playlist.m3u8`;

    // ตรวจสอบ Subtitle
    if (ep.video?.subtitleMetadata) {
      for (const [lang, subs] of Object.entries(ep.video.subtitleMetadata)) {
        for (const sub of subs) {
          const src = `${base}/${sub.pathName}.${sub.codec.toLowerCase()}`;
          if (await checkSubtitleExists(src)) {
            subtitle.push({ lang, codec: sub.codec, src });
          }
        }
      }
    }

    // ดึง Audio Tracks
    try {
      const res = await fetch(videoUrl);
      if (res.ok) {
        const m3u8Text = await res.text();
        audioTracks = extractAudioTracks(m3u8Text);
      }
    } catch {}
  }

  return {
    episode: parseInt(ep.episodeNo, 10),
    title: ep.titleTh || ep.titleEn || `EP${ep.episodeNo}`,
    video: videoUrl,
    subtitle,
    audioTracks
  };
}

async function fetchSeriesById(showId) {
  const query = `
    query getShow($id: Int!) {
      show(id: $id) {
        id titleTh titleEn nation synopsisTh descriptionTh releaseDate posterUrl
        episodes {
          seasonNo episodeNo titleTh titleEn synopsisTh releaseDate posterUrl
          video { transcodeUuid cdnHostname subtitleMetadata }
        }
      }
    }
  `;

  const response = await fetch("https://api.doo-nang.com/graphql", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query, variables: { id: parseInt(showId) } })
  });

  const result = await response.json();
  const show = result?.data?.show;
  if (!show) throw new Error("ไม่พบข้อมูลซีรีส์ ID: " + showId);

  const seriesData = {
    id: show.id,
    name: show.titleTh || show.titleEn,
    category: nationMap[show.nation] || "ซีรีส์",
    info: { poster: show.posterUrl, plot: show.synopsisTh || "-", year: show.releaseDate?.substring(0,4) || "0000" },
    seasons: []
  };

  const seasonMap = {};
  // ใช้ Promise.all เพื่อความเร็วในการเช็ค Subtitle หลายๆ ตอนพร้อมกัน
  const epPromises = (show.episodes || []).map(async (ep) => {
    const seasonNo = parseInt(ep.seasonNo || 1, 10);
    const processedEp = await processEpisode(ep);
    
    if (!seasonMap[seasonNo]) {
      seasonMap[seasonNo] = {
        season: seasonNo,
        name: `${seriesData.name} - Season ${seasonNo}`,
        episodes: []
      };
    }
    seasonMap[seasonNo].episodes.push(processedEp);
  });

  await Promise.all(epPromises);
  seriesData.seasons = Object.values(seasonMap).sort((a, b) => a.season - b.season);
  return seriesData;
}

// --- 2. ฟังก์ชันสร้าง M3U ---

function generateM3U(seriesData) {
  let m3u = "#EXTM3U\n";
  const logo = seriesData.info.poster;
  const mainTitle = seriesData.name;

  seriesData.seasons.forEach(s => {
    // เรียงตอนให้ถูกต้อง
    s.episodes.sort((a, b) => a.episode - b.episode);
    
    s.episodes.forEach(ep => {
      if (ep.video) {
        const S = String(s.season).padStart(2, '0');
        const E = String(ep.episode).padStart(2, '0');
        m3u += `#EXTINF:-1 type="series" group-title="${mainTitle}" tvg-logo="${logo}" tvg-season="${s.season}" tvg-episode="${ep.episode}", ${mainTitle} S${S} E${E} - ${ep.title}\n`;
        m3u += `${ep.video}\n`;
      }
    });
  });
  return m3u;
}

// --- 3. Event Listeners ---

document.getElementById("fetchBtn").addEventListener("click", async () => {
  const id = document.getElementById("showId").value;
  const loader = document.getElementById("loader");
  const resultArea = document.getElementById("resultArea");
  
  if (!id) return alert("กรุณาใส่ ID");

  loader.style.display = "block";
  resultArea.style.display = "none";

  try {
    const data = await fetchSeriesById(id);
    const m3u = generateM3U(data);

    document.getElementById("m3uOutput").textContent = m3u;
    document.getElementById("jsonOutput").textContent = JSON.stringify(data, null, 2);
    
    // ตั้งค่าปุ่มดาวน์โหลด
    const downloadBtn = document.getElementById("downloadBtn");
    downloadBtn.style.display = "block";
    downloadBtn.onclick = () => {
      const blob = new Blob([m3u], { type: 'text/plain' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${data.name.replace(/\s+/g, '_')}_S${id}.m3u`;
      a.click();
    };

    resultArea.style.display = "block";
  } catch (err) {
    alert(err.message);
  } finally {
    loader.style.display = "none";
  }
});
</script>

</body>
</html>
