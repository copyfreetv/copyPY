```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Doo-Nang Category Scraper</title>

<style>

body{
    background:#111;
    color:#fff;
    font-family:Arial;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.control{
    background:#1d1d1d;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
}

.card{
    background:#1e1e1e;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #333;
}

.poster{
    width:100%;
    height:350px;
    object-fit:cover;
}

.body{
    padding:15px;
}

.title{
    color:#ffeb3b;
    font-weight:bold;
    margin-bottom:10px;
}

.meta{
    color:#aaa;
    font-size:12px;
    margin-bottom:8px;
}

button{
    padding:10px;
    width:100%;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:8px;
}

.fetch-btn{
    background:#2196f3;
    color:#fff;
}

.toggle-btn{
    background:#444;
    color:#fff;
}

pre{
    display:none;
    background:#000;
    color:#00ff41;
    padding:10px;
    border-radius:6px;
    overflow:auto;
    max-height:250px;
    font-size:11px;
    margin-top:10px;
    white-space:pre-wrap;
}

select,input{
    padding:10px;
    border:none;
    border-radius:6px;
    background:#333;
    color:#fff;
}

#status{
    margin-top:15px;
    color:#ffeb3b;
}

</style>
</head>

<body>

<div class="container">

<h1>
🎬 Doo-Nang Category Scraper
</h1>

<div class="control">

<select id="category">

<option value="ALL">
ทั้งหมด
</option>

<option value="TH">
ไทย
</option>

<option value="KR">
เกาหลี
</option>

<option value="JP">
ญี่ปุ่น
</option>

<option value="IN">
อินเดีย
</option>

<option value="CN">
จีน
</option>

<option value="US">
ฮอลลีวูด
</option>

</select>

<input
type="number"
id="startId"
value="1">

<input
type="number"
id="endId"
value="3000">

<button
class="fetch-btn"
onclick="startScraping()">

🚀 เริ่มดึงข้อมูล

</button>

<div id="status">
พร้อมทำงาน
</div>

</div>

<div
id="output"
class="grid">
</div>

</div>

<script>

const GRAPHQL =
"https://api.doo-nang.com/graphql";

let allMovies = [];



// =====================================
// FETCH MOVIE
// =====================================

async function fetchMovie(id){

const query = `

query getMovie($id:Int!){

movie(id:$id){

id
titleTh
titleEn
nation
synopsisTh
posterUrl
releaseDate

video{
transcodeUuid
cdnHostname
}

}
}
`;

try{

const res =
await fetch(GRAPHQL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

query,

variables:{
id
}

})

});

const json =
await res.json();

const movie =
json?.data?.movie;

if(!movie)
return null;

const uuid =
movie.video?.transcodeUuid;

if(!uuid)
return null;

const title =
movie.titleTh ||
movie.titleEn;

let info = "";

// =====================================
// detect soundtrack
// =====================================

const lowerTitle =
title.toLowerCase();

if(
lowerTitle.includes("soundtrack")
||
lowerTitle.includes("ซับไทย")
){

info =
"Soundtrack/ซับไทย";

}else{

info =
"พากย์ไทย";

}

return {

id:
movie.id,

nation:
movie.nation || "movie",

title,

plot:
movie.synopsisTh || "-",

poster:
movie.posterUrl,

year:
parseInt(
movie.releaseDate?.substring(0,4)
|| "0"
),

video:
`https://api.doo-nang.com/video/${uuid}/playlist.m3u8`,

info

};

}catch{

return null;

}

}



// =====================================
// GENERATE M3U
// =====================================

function generateM3U(movie){

return `#EXTM3U
#EXTINF:-1 tvg-id="" tvg-logo="${movie.poster}" group-title="${movie.nation.toLowerCase()}",${movie.title}
${movie.video}`;

}



// =====================================
// GENERATE JSON
// =====================================

function generateJSON(movie){

return JSON.stringify({

name:
movie.title,

image:
movie.poster,

url:
movie.video,

referer:
"https://www.doo-nang.com/",

userAgent:
"Mozilla/5.0 (Windows NT 10.0; Win64; x64)",

info:
movie.info

},null,2);

}



// =====================================
// RENDER CARD
// =====================================

function renderMovie(movie){

const card =
document.createElement("div");

card.className =
"card";

card.innerHTML = `

<img
class="poster"
src="${movie.poster}">

<div class="body">

<div class="title">
${movie.title}
</div>

<div class="meta">
${movie.year}
|
${movie.nation}
</div>

<div class="meta">
${movie.info}
</div>

<button
class="toggle-btn"
onclick="toggleBox(this)">

📂 M3U Playlist

</button>

<pre>
${generateM3U(movie)}
</pre>

<button
class="toggle-btn"
onclick="toggleBox(this)">

📦 JSON

</button>

<pre>
${generateJSON(movie)}
</pre>

</div>
`;

document
.getElementById("output")
.appendChild(card);

}



// =====================================
// TOGGLE
// =====================================

function toggleBox(btn){

const pre =
btn.nextElementSibling;

const isOpen =
pre.style.display ===
"block";

pre.style.display =
isOpen
?
"none"
:
"block";

}



// =====================================
// START SCRAPING
// =====================================

async function startScraping(){

allMovies = [];

const category =
document
.getElementById("category")
.value;

const startId =
parseInt(
document
.getElementById("startId")
.value
);

const endId =
parseInt(
document
.getElementById("endId")
.value
);

const status =
document
.getElementById("status");

const output =
document
.getElementById("output");

output.innerHTML = "";

let total = 0;

for(
let id=startId;
id<=endId;
id++
){

status.innerHTML =
`🔍 กำลังดึง ID ${id}`;

const movie =
await fetchMovie(id);

if(!movie){

continue;

}


// =====================================
// FILTER CATEGORY
// =====================================

if(
category !== "ALL"
&&
movie.nation !== category
){

continue;

}

renderMovie(movie);

allMovies.push(movie);

total++;

await new Promise(
r=>setTimeout(r,120)
);

}


// =====================================
// SORT YEAR
// =====================================

allMovies.sort(
(a,b)=>
b.year - a.year
);


// =====================================
// RE-RENDER SORTED
// =====================================

output.innerHTML = "";

allMovies.forEach(movie=>{

renderMovie(movie);

});



status.innerHTML =
`✅ พบ ${total} เรื่อง`;

downloadFiles();

}



// =====================================
// DOWNLOAD FILES
// =====================================

function downloadFiles(){

// =====================================
// SORT YEAR
// =====================================

allMovies.sort(
(a,b)=>
b.year - a.year
);


// =====================================
// M3U
// =====================================

let m3u =
"#EXTM3U\n";


// =====================================
// JSON
// =====================================

let jsonOutput = [];



allMovies.forEach(movie=>{

// =====================================
// M3U
// =====================================

m3u +=
`#EXTINF:-1 tvg-id="" tvg-logo="${movie.poster}" group-title="${movie.nation.toLowerCase()}",${movie.title}
${movie.video}
`;



// =====================================
// JSON
// =====================================

jsonOutput.push({

name:
movie.title,

image:
movie.poster,

url:
movie.video,

referer:
"https://www.doo-nang.com/",

userAgent:
"Mozilla/5.0 (Windows NT 10.0; Win64; x64)",

info:
movie.info

});

});



// =====================================
// DOWNLOAD M3U
// =====================================

const blobM3U =
new Blob([m3u],{
type:"text/plain"
});

const urlM3U =
URL.createObjectURL(blobM3U);

const a1 =
document.createElement("a");

a1.href =
urlM3U;

a1.download =
"doo-nang.m3u";

a1.click();



// =====================================
// DOWNLOAD JSON
// =====================================

const blobJSON =
new Blob(
[
JSON.stringify(
jsonOutput,
null,
2
)
],
{
type:"application/json"
}
);

const urlJSON =
URL.createObjectURL(blobJSON);

const a2 =
document.createElement("a");

a2.href =
urlJSON;

a2.download =
"doo-nang.json";

a2.click();

}

</script>

</body>
</html>
```
