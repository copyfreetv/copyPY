<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS System Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        .video-container { width: 90%; max-width: 1000px; aspect-ratio: 16/9; background: #111; position: relative; }
        video { width: 100%; height: 100%; }
        .controls-ui { margin-top: 20px; width: 90%; max-width: 1000px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #222; color: #fff; }
        button { padding: 10px 20px; background: #5FBE00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .info { margin-top: 10px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="video" class="video-js vjs-default-skin" controls preload="auto"></video>
    </div>

    <div class="controls-ui">
        <input id="streamUrl" type="text" placeholder="วางลิงก์ .m3u8 ที่นี่...">
        <button onclick="loadStream()">เล่นวิดีโอ</button>
    </div>
    
    <div class="info">รองรับ: HLS (.m3u8), MP4 | ระบบ Adaptive Bitrate อัตโนมัติ</div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        const video = document.getElementById('video');
        const input = document.getElementById('streamUrl');

        // ตรวจสอบ Query String เผื่อส่ง URL มาทางลิงก์ เช่น player.html?src=...
        const urlParams = new URLSearchParams(window.location.search);
        const srcParam = urlParams.get('src');
        if (srcParam) {
            input.value = srcParam;
            setTimeout(loadStream, 500);
        }

        function loadStream() {
            const videoSrc = input.value;
            if (!videoSrc) return alert("กรุณาใส่ URL วิดีโอ");

            if (Hls.isSupported()) {
                const hls = new Hls({
                    // ตั้งค่าข้าม CORS หรือจัดการเรื่อง Buffer (ถ้าจำเป็น)
                    maxStartNextChunkDelay: 2,
                    lowLatencyMode: true,
                });
                
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });

                // จัดการ Error
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log("เครือข่ายมีปัญหา ลองดึงข้อมูลใหม่...");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.log("ถอดรหัสวิดีโอไม่ได้...");
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });
            }
            // สำหรับ Safari (iOS/Mac) ที่รองรับ HLS ในตัวอยู่แล้ว
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }
    </script>
</body>
</html>
