<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doo-Nang Series Parser</title>

<style>
:root{
  --green:#63ff00;
  --bg:#0f0f0f;
  --card:#1a1a1a;
  --border:#2a2a2a;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:Arial;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{
  color:var(--green);
  margin-bottom:20px;
}

.top{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:12px;
  background:#1f1f1f;
  border:1px solid #333;
  color:#fff;
  border-radius:8px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.fetch-btn{
  background:var(--green);
  color:#000;
}

.download-btn{
  background:#0080ff;
  color:#fff;
}

pre{
  background:#000;
  color:#63ff00;
  padding:15px;
  border-radius:10px;
  overflow:auto;
  max-height:500px;
  border:1px solid #333;
  font-size:12px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.title{
  color:var(--green);
  margin-bottom:10px;
  font-size:22px;
}

.loader{
  display:none;
  margin:20px 0;
  color:var(--green);
}

</style>
</head>

<body>

<div class="container">

<h1>Doo-Nang Series Parser</h1>

<div class="card">

<div class="top">

<input
id="showId"
type="number"
placeholder="ใส่ Show ID เช่น 7714"
/>

<button
class="fetch-btn"
onclick="startFetch()"
>
ดึงข้อมูล
</button>

<button
class="download-btn"
id="downloadBtn"
style="display:none"
>
ดาวน์โหลด .m3u
</button>

</div>

<div
class="loader"
id="loader"
>
กำลังโหลด...
</div>

</div>

<div
class="card"
id="m3uCard"
style="display:none"
>

<div class="title">
M3U Playlist
</div>

<pre id="m3uOutput"></pre>

</div>

<div
class="card"
id="jsonCard"
style="display:none"
>

<div class="title">
JSON Data
</div>

<pre id="jsonOutput"></pre>

</div>

</div>

<script>

const nationMap = {
  TH:"ซีรีส์ ไทย",
  KR:"ซีรีส์ เกาหลี",
  JP:"ซีรีส์ ญี่ปุ่น",
  US:"ซีรีส์ อเมริกา"
};



// ======================================
// Extract Audio Tracks
// ======================================

function extractAudioTracks(text){

  const tracks = [];

  const regex =
  /#EXT-X-MEDIA:TYPE=AUDIO.*?LANGUAGE="([^"]+)".*?URI="([^"]+)"/g;

  let match;

  while((match = regex.exec(text)) !== null){

    tracks.push({
      language: match[1],
      uri: match[2]
    });

  }

  return tracks;

}



// ======================================
// Parse Quality URL
// ======================================

function parseBestQuality(m3u8Text){

  const qualities = [

    /https:\/\/[^\n]+1080p\.m3u8/g,

    /https:\/\/[^\n]+720p\.m3u8/g,

    /https:\/\/[^\n]+480p\.m3u8/g

  ];

  for(const q of qualities){

    const match = m3u8Text.match(q);

    if(match && match[0]){

      return match[0];

    }

  }

  return null;

}



// ======================================
// Process Episode
// ======================================

async function processEpisode(ep){

  const transcodeUuid =
  ep.video?.transcodeUuid;

  const cdnHostname =
  ep.video?.cdnHostname;

  let videoUrl = "";

  let audioTracks = [];

  if(transcodeUuid && cdnHostname){

    const masterUrl =
    `https://api.doo-nang.com/video/${transcodeUuid}/playlist.m3u8`;

    try{

      const res =
      await fetch(masterUrl);

      if(res.ok){

        const text =
        await res.text();

        audioTracks =
        extractAudioTracks(text);

        const best =
        parseBestQuality(text);

        if(best){

          videoUrl = best;

        }else{

          videoUrl = masterUrl;

        }

      }

    }catch(e){

      console.log(e);

    }

  }

  return {

    episode:
    parseInt(ep.episodeNo || 1),

    title:
    ep.titleTh ||
    ep.titleEn ||
    `EP${ep.episodeNo}`,

    video:
    videoUrl,

    poster:
    ep.posterUrl,

    audioTracks

  };

}



// ======================================
// Fetch Series
// ======================================

async function fetchSeriesById(showId){

  const query = `

query getShow($id:Int!){

show(id:$id){

id
titleTh
titleEn
nation
posterUrl
releaseDate

episodes{

seasonNo
episodeNo
titleTh
titleEn
posterUrl

video{
transcodeUuid
cdnHostname
}

}

}

}

`;

  const response =
  await fetch(
    "https://api.doo-nang.com/graphql",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        query,
        variables:{
          id:parseInt(showId)
        }
      })
    }
  );

  const result =
  await response.json();

  const show =
  result?.data?.show;

  if(!show){

    throw new Error("ไม่พบข้อมูล");

  }

  const data = {

    id:show.id,

    name:
    show.titleTh ||
    show.titleEn,

    poster:
    show.posterUrl,

    category:
    nationMap[show.nation] ||
    "ซีรีส์",

    seasons:[]

  };

  const seasonMap = {};

  const tasks =
  (show.episodes || []).map(async ep=>{

    const seasonNo =
    parseInt(ep.seasonNo || 1);

    const processed =
    await processEpisode(ep);

    if(!seasonMap[seasonNo]){

      seasonMap[seasonNo] = {

        season:seasonNo,

        episodes:[]

      };

    }

    seasonMap[seasonNo]
    .episodes
    .push(processed);

  });

  await Promise.all(tasks);

  data.seasons =
  Object.values(seasonMap);

  return data;

}



// ======================================
// Generate M3U
// ======================================

function generateM3U(data){

  let m3u = "#EXTM3U\n\n";

  data.seasons.forEach(season=>{

    season.episodes.sort(
      (a,b)=>a.episode-b.episode
    );

    season.episodes.forEach(ep=>{

      if(!ep.video) return;

      const S =
      String(season.season)
      .padStart(2,"0");

      const E =
      String(ep.episode)
      .padStart(2,"0");

      m3u +=
`#EXTINF:-1 type="series" group-title="${data.name}" tvg-logo="${data.poster}",${data.name} S${S}E${E} - ${ep.title}
#EXTVLCOPT:http-referrer=https://www.doo-nang.com/
#EXTVLCOPT:http-origin=https://www.doo-nang.com
${ep.video}

`;

    });

  });

  return m3u;

}



// ======================================
// Start
// ======================================

async function startFetch(){

  const id =
  document
  .getElementById("showId")
  .value;

  if(!id){

    alert("กรุณาใส่ ID");

    return;

  }

  document
  .getElementById("loader")
  .style.display = "block";

  try{

    const data =
    await fetchSeriesById(id);

    const m3u =
    generateM3U(data);

    document
    .getElementById("m3uOutput")
    .textContent = m3u;

    document
    .getElementById("jsonOutput")
    .textContent =
    JSON.stringify(
      data,
      null,
      2
    );

    document
    .getElementById("m3uCard")
    .style.display = "block";

    document
    .getElementById("jsonCard")
    .style.display = "block";



    // download

    const btn =
    document
    .getElementById("downloadBtn");

    btn.style.display = "inline-block";

    btn.onclick = ()=>{

      const blob =
      new Blob(
        [m3u],
        {type:"text/plain"}
      );

      const url =
      URL.createObjectURL(blob);

      const a =
      document.createElement("a");

      a.href = url;

      a.download =
      `${data.name}.m3u`;

      a.click();

    };

  }catch(err){

    alert(err.message);

  }

  document
  .getElementById("loader")
  .style.display = "none";

}

</script>

</body>
</html>
