<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doo-Nang Explorer</title>

<style>

:root{
  --green:#63ff00;
  --bg:#0f0f0f;
  --card:#1a1a1a;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:Arial;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.topbar{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input,select{
  padding:12px;
  background:#1f1f1f;
  border:1px solid #333;
  color:#fff;
  border-radius:10px;
}

input{
  flex:1;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.fetch-btn{
  background:var(--green);
  color:#000;
}

.grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:15px;
  overflow:hidden;
  border:1px solid #2a2a2a;
}

.poster{
  width:100%;
  height:320px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.title{
  font-size:16px;
  font-weight:bold;
  margin-bottom:10px;
  min-height:45px;
}

.btn{
  width:100%;
  margin-top:8px;
}

pre{
  background:#000;
  color:#63ff00;
  padding:15px;
  border-radius:10px;
  overflow:auto;
  max-height:500px;
  font-size:12px;
}

.section{
  margin-top:30px;
}

.loader{
  display:none;
  margin:20px 0;
  color:var(--green);
}

</style>
</head>

<body>

<div class="container">

<h1 style="color:#63ff00">
Doo-Nang Explorer
</h1>

<div class="topbar">

<select id="mode">

<option value="series">
ซีรีย์
</option>

<option value="movie">
หนัง
</option>

</select>

<input
id="showId"
placeholder="ใส่ ID เช่น 7714"
/>

<button
class="fetch-btn"
onclick="fetchById()"
>
ดึงด้วย ID
</button>

<button
class="fetch-btn"
onclick="loadLatest()"
>
โหลดล่าสุด
</button>

</div>

<div
class="loader"
id="loader"
>
กำลังโหลด...
</div>

<div
class="grid"
id="grid"
></div>

<div
class="section"
id="jsonSection"
style="display:none"
>

<h2 style="color:#63ff00">
JSON Output
</h2>

<pre id="jsonOutput"></pre>

</div>

<div
class="section"
id="m3uSection"
style="display:none"
>

<h2 style="color:#63ff00">
M3U Output
</h2>

<pre id="m3uOutput"></pre>

</div>

</div>

<script>

// ========================================
// CONFIG
// ========================================

const GRAPHQL =
"https://api.doo-nang.com/graphql";



// ========================================
// FETCH GRAPHQL
// ========================================

async function gql(query,variables={}){

  const res =
  await fetch(GRAPHQL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      query,
      variables
    })
  });

  return await res.json();

}



// ========================================
// PARSE MASTER PLAYLIST
// ========================================

async function getBestStream(url){

  try{

    const res =
    await fetch(url);

    const text =
    await res.text();

    const qualities = [

      /https:\/\/[^\n]+1080p\.m3u8/g,

      /https:\/\/[^\n]+720p\.m3u8/g,

      /https:\/\/[^\n]+480p\.m3u8/g

    ];

    for(const q of qualities){

      const match =
      text.match(q);

      if(match){

        return match[0];

      }

    }

    return url;

  }catch{

    return url;

  }

}



// ========================================
// PROCESS SERIES
// ========================================

async function processSeries(show){

  const stations = [];

  const eps =
  show.episodes || [];

  const totalEp =
  eps.length;

  for(const ep of eps){

    const uuid =
    ep.video?.transcodeUuid;

    if(!uuid) continue;

    const master =
`https://api.doo-nang.com/video/${uuid}/playlist.m3u8`;

    const realUrl =
    await getBestStream(master);

    stations.push({

      name:
      `EP.${String(ep.episodeNo).padStart(2,"0")}`,

      image:
      ep.posterUrl ||
      show.posterUrl,

      url:
      realUrl,

      referer:
      "",

      info:
      `HD | พากย์ไทย | EP 1 - ${totalEp}`,

      playInNatPlayer:
      "true"

    });

  }

  return {

    name:
    show.titleTh ||
    show.titleEn,

    image:
    show.posterUrl,

    stations

  };

}



// ========================================
// PROCESS MOVIE
// ========================================

async function processMovie(show){

  const stations = [];

  const uuid =
  show.video?.transcodeUuid;

  if(uuid){

    const master =
`https://api.doo-nang.com/video/${uuid}/playlist.m3u8`;

    const realUrl =
    await getBestStream(master);

    stations.push({

      name:"Movie",

      image:
      show.posterUrl,

      url:
      realUrl,

      referer:"",

      info:"HD | พากย์ไทย",

      playInNatPlayer:"true"

    });

  }

  return {

    name:
    show.titleTh ||
    show.titleEn,

    image:
    show.posterUrl,

    stations

  };

}



// ========================================
// FETCH BY ID
// ========================================

async function fetchById(){

  const mode =
  document
  .getElementById("mode")
  .value;

  const id =
  document
  .getElementById("showId")
  .value;

  if(!id){

    alert("ใส่ ID");

    return;

  }

  showLoader(true);

  try{

    const query = `

query getShow($id:Int!){

show(id:$id){

id
titleTh
titleEn
posterUrl

video{
transcodeUuid
}

episodes{

episodeNo
posterUrl

video{
transcodeUuid
}

}

}

}

`;

    const res =
    await gql(query,{
      id:parseInt(id)
    });

    const show =
    res.data.show;

    let data;

    if(mode === "series"){

      data =
      await processSeries(show);

    }else{

      data =
      await processMovie(show);

    }

    renderSingle(show,data);

  }catch(e){

    alert(e.message);

  }

  showLoader(false);

}



// ========================================
// LOAD LATEST
// ========================================

async function loadLatest(){

  const mode =
  document
  .getElementById("mode")
  .value;

  showLoader(true);

  const query = `

query{

search(
limit:20
sort:"releaseDate:DESC"
){

items{

id
titleTh
titleEn
posterUrl

video{
transcodeUuid
}

episodes{

episodeNo
posterUrl

video{
transcodeUuid
}

}

}

}

}

`;

  try{

    const res =
    await gql(query);

    const items =
    res.data.search.items;

    renderGrid(items,mode);

  }catch(e){

    alert(e.message);

  }

  showLoader(false);

}



// ========================================
// RENDER GRID
// ========================================

function renderGrid(items,mode){

  const grid =
  document
  .getElementById("grid");

  grid.innerHTML = "";

  items.forEach(item=>{

    const div =
    document.createElement("div");

    div.className = "card";

    div.innerHTML = `

<img
class="poster"
src="${item.posterUrl}"
>

<div class="content">

<div class="title">
${item.titleTh || item.titleEn}
</div>

<button
class="btn fetch-btn"
onclick="openItem(${item.id})"
>
เปิด
</button>

</div>

`;

    grid.appendChild(div);

  });

}



// ========================================
// OPEN ITEM
// ========================================

async function openItem(id){

  document
  .getElementById("showId")
  .value = id;

  await fetchById();

}



// ========================================
// RENDER SINGLE
// ========================================

function renderSingle(show,data){

  document
  .getElementById("jsonSection")
  .style.display = "block";

  document
  .getElementById("jsonOutput")
  .textContent =
  JSON.stringify(
    data,
    null,
    2
  );



  // M3U

  let m3u =
  "#EXTM3U\n\n";

  data.stations.forEach(st=>{

    m3u +=
`#EXTINF:-1 group-title="${data.name}" tvg-logo="${st.image}",${st.name}
${st.url}

`;

  });

  document
  .getElementById("m3uSection")
  .style.display = "block";

  document
  .getElementById("m3uOutput")
  .textContent = m3u;

}



// ========================================
// LOADER
// ========================================

function showLoader(v){

  document
  .getElementById("loader")
  .style.display =
  v ? "block" : "none";

}

</script>

</body>
</html>
