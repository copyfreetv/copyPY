<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Doo-Nang Netflix Parser Fix</title>
  <style>
    :root { --netflix-red: #E50914; --bg: #141414; --card: #181818; }
    body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: #fff; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header-box { background: #000; padding: 30px; border-radius: 15px; border-bottom: 5px solid var(--netflix-red); text-align: center; margin-bottom: 30px; }
    .input-row { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
    input { background: #333; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 5px; width: 100px; text-align: center; font-size: 18px; }
    button { background: var(--netflix-red); color: #fff; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .status { margin-top: 15px; color: #aaa; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    .card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
    .card:hover { transform: scale(1.03); border-color: var(--netflix-red); }
    .card img { width: 100%; height: 380px; object-fit: cover; }
    .card-info { padding: 15px; }
    .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; height: 40px; overflow: hidden; }
    .btn-action { display: block; width: 100%; background: #333; color: #fff; text-align: center; padding: 8px; margin-top: 8px; text-decoration: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
    pre { background: #000; color: #00ff41; padding: 10px; font-size: 10px; overflow-x: auto; max-height: 150px; display: none; margin-top: 10px; border: 1px solid #333; }
  </style>
</head>
<body>

<div class="container">
  <div class="header-box">
    <h1>Netflix Series Parser (Doo-Nang)</h1>
    <div class="input-row">
      <label>เลือกหน้าที่ต้องการดึง:</label>
      <input type="number" id="pageInp" value="1" min="1">
      <button onclick="startParsing()">🚀 ดึงรายการทั้งหมด</button>
    </div>
    <div id="statusMsg" class="status">กรุณาระบุเลขหน้าและกดเริ่ม</div>
  </div>

  <div id="gridBox" class="grid"></div>
</div>

<script>
const GRAPHQL_URL = "https://api.doo-nang.com/graphql";

// 1. ฟังก์ชันส่ง Query ไปหา API
async function callApi(query, variables) {
  try {
    const res = await fetch(GRAPHQL_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, variables })
    });
    const json = await res.json();
    return json.data;
  } catch (e) {
    console.error("API Error:", e);
    return null;
  }
}

// 2. ดึงรายการ ID หนังในหน้า Netflix
async function getSeriesList(page) {
  const limit = 24;
  const offset = (page - 1) * limit;
  const query = `
    query getShows($limit: Int, $offset: Int, $type: String, $value: String) {
      shows(limit: $limit, offset: $offset, type: $type, value: $value) {
        items { id titleTh titleEn posterUrl }
      }
    }
  `;
  const data = await callApi(query, { limit, offset, type: "serie-tag", value: "netflix" });
  return data?.shows?.items || [];
}

// 3. ดึงรายละเอียดทุกตอนของซีรีส์นั้นๆ
async function getSeriesDetail(id) {
  const query = `
    query getShow($id: Int!) {
      show(id: $id) {
        titleTh titleEn posterUrl
        episodes {
          seasonNo episodeNo titleTh
          video { transcodeUuid }
        }
      }
    }
  `;
  const data = await callApi(query, { id: parseInt(id) });
  return data?.show;
}

// 4. เริ่มประมวลผล
async function startParsing() {
  const page = document.getElementById("pageInp").value;
  const status = document.getElementById("statusMsg");
  const grid = document.getElementById("gridBox");
  
  grid.innerHTML = "";
  status.textContent = "⌛ กำลังโหลดรายการซีรีส์ Netflix...";

  const items = await getSeriesList(page);
  
  if (!items || items.length === 0) {
    status.textContent = "❌ หาไม่พบ! อาจเป็นเพราะหน้าว่างหรือ API มีการเปลี่ยนแปลง";
    return;
  }

  status.textContent = `พบ ${items.length} เรื่อง กำลังดึงข้อมูลไฟล์วิดีโอ...`;

  for (const item of items) {
    const detail = await getSeriesDetail(item.id);
    if (!detail) continue;

    renderCard(detail);
  }
  
  status.textContent = "✅ ดึงข้อมูลสำเร็จ!";
}

// 5. สร้างการ์ดแสดงผล
function renderCard(show) {
  let m3u = "#EXTM3U\n";
  const title = show.titleTh || show.titleEn;
  
  show.episodes.forEach(ep => {
    if (ep.video && ep.video.transcodeUuid) {
      const vUrl = `https://api.doo-nang.com/video/${ep.video.transcodeUuid}/playlist.m3u8`;
      const s = String(ep.seasonNo || 1).padStart(2, '0');
      const e = String(ep.episodeNo).padStart(2, '0');
      
      m3u += `#EXTINF:-1 tvg-logo="${show.posterUrl}" group-title="${title}", ${title} S${s}E${e} - ${ep.titleTh || ''}\n`;
      m3u += `${vUrl}\n`;
    }
  });

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <img src="${show.posterUrl}">
    <div class="card-info">
      <div class="card-title">${title}</div>
      <button class="btn-action" onclick="toggleM3U(this)">📂 ดู Playlist M3U</button>
      <button class="btn-action" style="background:#0078d7" onclick="downloadFile('${title}', \`${m3u}\`)">📥 ดาวน์โหลด .m3u</button>
      <pre>${m3u}</pre>
    </div>
  `;
  document.getElementById("gridBox").appendChild(card);
}

function toggleM3U(btn) {
  const pre = btn.parentElement.querySelector("pre");
  pre.style.display = pre.style.display === "block" ? "none" : "block";
  btn.textContent = pre.style.display === "block" ? "✖ ปิดหน้าต่าง" : "📂 ดู Playlist M3U";
}

function downloadFile(name, content) {
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${name.replace(/\s+/g, '_')}.m3u`;
  a.click();
}
</script>

</body>
</html>
