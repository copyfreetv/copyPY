<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบดึงข้อมูล 24-HDS Pro</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background: #0f0f0f; color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .control-panel { background: #222; padding: 20px; border-radius: 12px; margin-bottom: 25px; border-top: 4px solid #e91e63; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-body { padding: 15px; }
        pre { background: #000; color: #00ff41; padding: 10px; font-size: 10px; overflow-x: auto; display: none; }
        button { cursor: pointer; padding: 8px 15px; border: none; border-radius: 4px; background: #e91e63; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: #ffeb3b;">ระบบดึงข้อมูล 24-HDS (Fix)</h1>
    <div class="control-panel">
        <input type="number" id="startPage" value="1" style="width:50px;"> ถึง <input type="number" id="endPage" value="1" style="width:50px;">
        <button onclick="startHarvesting()">🚀 เริ่มดึงข้อมูล</button>
        <div id="loader" style="margin-top:10px;">📍 พร้อมทำงาน</div>
    </div>
    <div id="output" class="grid"></div>
</div>

<script>
const PROXY = '/api/proxy-24hd?url=';
const BASE_URL = 'https://www.24-hds.com';

async function request(url) {
    try {
        const res = await fetch(PROXY + encodeURIComponent(url));
        return await res.text();
    } catch (e) { return null; }
}

async function startHarvesting() {
    const start = parseInt(document.getElementById("startPage").value);
    const end = parseInt(document.getElementById("endPage").value);
    const output = document.getElementById("output");
    const loader = document.getElementById("loader");
    output.innerHTML = "";

    for (let p = start; p <= end; p++) {
        loader.textContent = `🔍 กำลังสแกนหน้า: ${p}`;
        // ปรับ URL หมวดหมู่หนังใหม่
        const pageUrl = p === 1 ? `${BASE_URL}/หนังใหม่-2026/` : `${BASE_URL}/หนังใหม่-2026/page/${p}/`;
        const html = await request(pageUrl);
        if(!html) continue;

        // Regex จับลิงก์จากโครงสร้าง 24-hds
        const regex = /href="(https:\/\/www\.24-hds\.com\/movie\/[^"]+)"/g;
        const matches = [...new Set([...html.matchAll(regex)].map(m => m[1]))];

        for (let url of matches) {
            const movieHtml = await request(url);
            if(!movieHtml) continue;
            
            const doc = new DOMParser().parseFromString(movieHtml, "text/html");
            const title = doc.querySelector("h1.entry-title")?.textContent.trim() || "ไม่ทราบชื่อ";
            const poster = doc.querySelector(".post-thumbnail img")?.src || "";
            
            // ดึง ID จาก Iframe ของ 24playerhd
            const iframe = doc.querySelector("iframe");
            let m3u = "";
            if (iframe && iframe.src.includes("24playerhd.com")) {
                const idMatch = iframe.src.match(/embed\/([^?\/]+)/);
                if (idMatch) {
                    const id = idMatch[1];
                    m3u = `#EXTM3U\n#EXTINF:-1 tvg-logo="${poster}" group-title="${title}", ${title}\nhttps://main.24playerhd.com/newplaylist/${id}/${id}.m3u8`;
                }
            }

            if (m3u) renderCard(title, poster, m3u);
        }
    }
    loader.textContent = "✅ ดึงข้อมูลสำเร็จ!";
}

function renderCard(title, poster, m3u) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <img src="${poster}">
        <div class="card-body">
            <div style="font-weight:bold; margin-bottom:10px;">${title}</div>
            <button onclick="this.nextElementSibling.style.display = (this.nextElementSibling.style.display === 'block' ? 'none' : 'block')">📂 M3U Playlist</button>
            <pre>${m3u}</pre>
        </div>
    `;
    document.getElementById("output").appendChild(card);
}
</script>
</body>
</html>
