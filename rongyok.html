<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rongyok Parser Pro (JSON & M3U)</title>
  <style>
    :root { --primary: #ffeb3b; --bg: #1a1a1a; --card: #2d2d2d; --text: #ffffff; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
    .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    h1 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; color: var(--primary); }
    .series-info { display: flex; gap: 20px; margin-bottom: 20px; border: 1px solid #444; padding: 15px; border-radius: 8px; }
    .series-info img { width: 150px; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
    .actions { display: flex; gap: 10px; margin: 20px 0; }
    button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-json { background: #2196F3; color: white; }
    .btn-m3u { background: #4CAF50; color: white; }
    button:hover { opacity: 0.8; transform: translateY(-2px); }
    pre { background: #000; color: #00ff41; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 13px; max-height: 400px; border: 1px solid #333; }
    .hidden { display: none; }
    .tabs { margin-top: 20px; }
  </style>
</head>
<body>

<div class="container">
  <h1>Rongyok Playlist Parser</h1>
  
  <div id="loading" style="text-align:center; padding: 50px;">กำลังประมวลผลข้อมูล...</div>
  
  <div id="content" class="hidden">
    <div id="seriesDisplay" class="series-info"></div>

    <div class="actions">
      <button class="btn-m3u" id="downloadM3U">📥 Download .M3U</button>
      <button class="btn-json" id="downloadJSON">📥 Download .JSON</button>
    </div>

    <div class="tabs">
      <h3 style="color: var(--primary);">M3U Preview:</h3>
      <pre id="m3uOutput"></pre>
      
      <h3 style="color: #2196F3;">JSON Preview:</h3>
      <pre id="jsonOutput"></pre>
    </div>
  </div>
</div>

<script>
// --- ฟังก์ชันหลักในการดึงข้อมูล ---
async function fetchViaProxy(url) {
  // ใช้ Proxy เพื่อหลีกเลี่ยง CORS
  const proxyUrl = `/api/proxy-rongyok?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxyUrl);
  if (!res.ok) return null;
  return await res.text();
}

function extractSeriesData(html) {
  const match = html.match(/const\s+seriesData\s*=\s*(\{.*?\});/s);
  if (!match) return null;
  try {
    // ลบช่องว่างและอักขระพิเศษเพื่อให้ JSON.parse ทำงานได้
    const cleanJson = match[1].replace(/[\n\r\t]/g, '').replace(/,\s*}/g, '}');
    return JSON.parse(cleanJson);
  } catch (e) {
    console.error("Parse error:", e);
    return null;
  }
}

// --- ฟังก์ชันสร้างเนื้อหา M3U ---
function generateM3U(jsonData) {
  let m3u = "#EXTM3U\n";
  jsonData.seasons[0].episodes.forEach(ep => {
    // ใส่ Metadata: ชื่อเรื่อง, ตอนที่, และรูปปก
    m3u += `#EXTINF:-1 tvg-logo="${jsonData.info.poster}" group-title="${jsonData.name}", ${jsonData.name} - ${ep.name}\n`;
    // ใส่ User-Agent หรือ Referrer หากจำเป็น (ในที่นี้ใส่ URL วิดีโอตรงๆ)
    m3u += `${ep.video}\n`;
  });
  return m3u;
}

// --- ฟังก์ชันสร้างโครงสร้าง JSON ---
function generateJSON(data) {
  const posterUrl = data.jpg_url ? "https://rongyok.com/" + data.jpg_url.replace(/^\//, '') : "";
  const seasons = [{
    season: 1,
    episodes: (data.episodes || []).map(ep => ({
      episode: ep.episode_number,
      name: `ตอนที่ ${ep.episode_number}`,
      video: ep.video_url,
      referrer: "https://rongyok.com/"
    }))
  }];

  return {
    id: data.id,
    name: data.title,
    category: "ซีรี่ย์จีนสั้น",
    info: {
      poster: posterUrl,
      description: data.description || "ไม่มีคำบรรยาย",
      year: data.created_at ? new Date(data.created_at).getFullYear() : new Date().getFullYear()
    },
    seasons
  };
}

// --- ฟังก์ชันดาวน์โหลดไฟล์ ---
function saveFile(content, filename, type) {
  const blob = new Blob([content], { type: type });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

async function main() {
  const params = new URLSearchParams(window.location.search);
  const seriesId = params.get("series_id") || "7573";
  const url = `https://rongyok.com/watch/?series_id=${seriesId}`;

  try {
    const html = await fetchViaProxy(url);
    if (!html) throw new Error("ไม่สามารถดึงข้อมูล HTML ได้");

    const rawData = extractSeriesData(html);
    if (!rawData) throw new Error("ไม่พบ seriesData ในหน้านี้");

    const jsonData = generateJSON(rawData);
    const m3uData = generateM3U(jsonData);

    // แสดงผลบนหน้าเว็บ
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("content").classList.remove("hidden");

    document.getElementById("seriesDisplay").innerHTML = `
      <img src="${jsonData.info.poster}" alt="Poster">
      <div>
        <h2 style="margin-top:0">${jsonData.name}</h2>
        <p><b>ปี:</b> ${jsonData.info.year} | <b>จำนวน:</b> ${jsonData.seasons[0].episodes.length} ตอน</p>
        <p style="font-size:14px; color:#ccc">${jsonData.info.description}</p>
      </div>
    `;

    document.getElementById("m3uOutput").textContent = m3uData;
    document.getElementById("jsonOutput").textContent = JSON.stringify(jsonData, null, 2);

    // ตั้งค่าปุ่มดาวน์โหลด
    document.getElementById("downloadM3U").onclick = () => saveFile(m3uData, `${seriesId}.m3u`, "text/plain");
    document.getElementById("downloadJSON").onclick = () => saveFile(JSON.stringify(jsonData, null, 2), `${seriesId}.json`, "application/json");

  } catch (err) {
    document.getElementById("loading").innerHTML = `<b style="color:red">เกิดข้อผิดพลาด: ${err.message}</b>`;
  }
}

main();
</script>
</body>
</html>
